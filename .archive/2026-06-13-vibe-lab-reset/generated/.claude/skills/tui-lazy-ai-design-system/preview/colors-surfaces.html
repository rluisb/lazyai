<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Surface colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 80px; border-radius: var(--radius-md); border: 1px solid color-mix(in oklch, var(--lz-text) 12%, transparent); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--lz-text); }
  .hex  { font-family: var(--font-mono); font-size: 11px; color: var(--lz-dimmed); }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#181825"></div><div class="name">bg-2</div><div class="hex">#181825</div></div>
    <div class="sw"><div class="chip" style="background:#1E1E2E"></div><div class="name">bg</div><div class="hex">#1E1E2E</div></div>
    <div class="sw"><div class="chip" style="background:#313244"></div><div class="name">bg-code</div><div class="hex">#313244</div></div>
    <div class="sw"><div class="chip" style="background:#6C7086"></div><div class="name">dimmed</div><div class="hex">#6C7086</div></div>
    <div class="sw"><div class="chip" style="background:#CDD6F4"></div><div class="name">text</div><div class="hex">#CDD6F4</div></div>
  </div>
</body>
</html>
