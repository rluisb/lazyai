<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body { margin: 0; padding: 18px 22px; font-family: var(--font-mono); font-size: 13px; }
.box { border: 1px solid var(--lz-success); border-radius: 6px; padding: 10px 14px; max-width: 500px; }
.title { color: var(--lz-primary); font-weight: 700; margin-bottom: 8px; }
.line { margin: 2px 0; }
.ok { color: var(--lz-success); }
.w  { color: var(--lz-warning); }
.dim { color: var(--lz-dimmed); margin-top: 8px; }
</style></head><body>
<div class="box">
  <div class="title">Setup complete</div>
  <div class="line"><span class="ok">✓</span> .ai/ scaffolded</div>
  <div class="line"><span class="ok">✓</span> 3 tools compiled</div>
  <div class="line"><span class="w">⚠</span> 1 file customized — backed up</div>
  <div class="dim">installed: 14  modified: 1  skipped: 0</div>
</div>
</body></html>
