<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body { margin: 0; padding: 18px 22px; font-family: var(--font-mono); font-size: 13px; }
.row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.label { color: var(--lz-text); width: 110px; }
.bar { flex: 0 0 220px; }
.frac { color: var(--lz-dimmed); }
.fill { color: var(--lz-success); }
.track { color: var(--lz-dimmed); }
@keyframes blink { 50% { opacity: 0; } }
.cursor::after { content: "▌"; color: var(--lz-primary); animation: blink 1s steps(1) infinite; margin-left: 1px; }
.spinrow { display: flex; align-items: center; gap: 10px; }
@keyframes spin {
  0%   { content: "⠋"; } 10%  { content: "⠙"; } 20%  { content: "⠹"; }
  30%  { content: "⠸"; } 40%  { content: "⠼"; } 50%  { content: "⠴"; }
  60%  { content: "⠦"; } 70%  { content: "⠧"; } 80%  { content: "⠇"; }
  90%  { content: "⠏"; }
}
.spin::before { content: "⠋"; color: var(--lz-primary); animation: spin 0.8s steps(1) infinite; margin-right: 6px; font-weight: 700; }
</style></head><body>
<div class="row">
  <span class="label">install</span>
  <span class="bar"><span class="fill">██████████████░░░░░░</span></span>
  <span class="frac">14/20</span>
</div>
<div class="row">
  <span class="label">compile</span>
  <span class="bar"><span class="fill">██████████████████░░</span></span>
  <span class="frac">18/20</span>
</div>
<div class="spinrow"><span class="spin"></span><span style="color:var(--lz-text)">scaffolding canonical files</span><span class="cursor"></span></div>
</body></html>
