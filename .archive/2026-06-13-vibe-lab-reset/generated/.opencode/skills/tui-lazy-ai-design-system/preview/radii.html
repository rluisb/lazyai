<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; display: flex; gap: 18px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .box { width: 72px; height: 72px; background: var(--lz-bg-code); border: var(--border); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--lz-text); }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--lz-dimmed); }
</style>
</head>
<body>
  <div class="item"><div class="box" style="border-radius:0"></div><div class="name">none</div><div class="px">0</div></div>
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="name">sm</div><div class="px">4px</div></div>
  <div class="item"><div class="box" style="border-radius:6px"></div><div class="name">md</div><div class="px">6px</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="name">lg</div><div class="px">12px</div></div>
  <div class="item"><div class="box" style="border-radius:999px"></div><div class="name">pill</div><div class="px">999</div></div>
</body>
</html>
