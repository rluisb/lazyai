# Bugfix Workflow
# Systematic bug investigation and resolution

name: bugfix
version: "1.0"
description: "Systematic bug investigation and resolution workflow"

phases:
  - name: reproduce
    description: "Reproduce the bug consistently"
    agent: scout
    mode: research
    inputs:
      - bug_report
      - reproduction_steps
    outputs:
      - reproduction_confirmed
    gates:
      - type: auto
        description: "Confirm reproduction"

  - name: investigate
    description: "Root cause analysis"
    agent: scout
    mode: diagnose
    inputs:
      - reproduction_confirmed
      - error_logs
    outputs:
      - root_cause_analysis
    gates:
      - type: human
        description: "Review root cause before fix"

  - name: fix
    description: "Implement fix with tests"
    agent: builder
    mode: standard
    inputs:
      - root_cause_analysis
    outputs:
      - fix_implementation
      - regression_tests
    gates:
      - type: auto
        description: "Run tests automatically"

  - name: verify
    description: "Verify fix and check for regressions"
    agent: reviewer
    mode: review
    inputs:
      - fix_implementation
      - regression_tests
    outputs:
      - verification_report
    gates:
      - type: human
        description: "Approve fix before merge"

fallback:
  on_agent_failure:
    action: retry
    max_retries: 2
    fallback_agent: orchestrator
  on_test_failure:
    action: iterate
    max_attempts: 3
  on_timeout:
    action: escalate
    notify: human

metadata:
  estimated_duration: "1-3 hours"
  complexity: medium
  requires_approval: true
