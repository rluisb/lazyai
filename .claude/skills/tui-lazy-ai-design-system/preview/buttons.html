<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body { margin: 0; padding: 18px 22px; }
.row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.btn { font-family: var(--font-mono); font-size: 13px; font-weight: 700; padding: 8px 16px; border-radius: 6px; border: 1px solid transparent; cursor: pointer; }
.btn.primary { background: #7D56F4; color: #fff; }
.btn.secondary { background: transparent; color: var(--lz-text); border-color: var(--lz-dimmed); }
.btn.ghost { background: transparent; color: var(--lz-secondary); border: none; padding-left: 4px; padding-right: 4px; border-bottom: 1px dashed currentColor; border-radius: 0; }
.btn.danger { background: transparent; color: var(--lz-error); border-color: var(--lz-error); }
</style></head><body>
<div class="row">
  <button class="btn primary">Run init</button>
  <button class="btn secondary">View plan</button>
  <button class="btn danger">Eject</button>
  <button class="btn ghost">read the docs →</button>
</div>
</body></html>
