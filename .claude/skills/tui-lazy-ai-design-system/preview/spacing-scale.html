<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body { margin: 0; padding: 18px 22px; font-family: var(--font-mono); }
.row { display: flex; align-items: flex-end; gap: 14px; }
.tok { display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 11px; color: var(--lz-dimmed); }
.bar { background: #7D56F4; border-radius: 2px; }
.tok .v { color: var(--lz-text); font-weight: 700; }
</style></head><body>
<div class="row">
  <div class="tok"><div class="bar" style="width:4px;height:4px"></div><span>1</span><span class="v">4</span></div>
  <div class="tok"><div class="bar" style="width:8px;height:8px"></div><span>2</span><span class="v">8</span></div>
  <div class="tok"><div class="bar" style="width:12px;height:12px"></div><span>3</span><span class="v">12</span></div>
  <div class="tok"><div class="bar" style="width:16px;height:16px"></div><span>4</span><span class="v">16</span></div>
  <div class="tok"><div class="bar" style="width:24px;height:24px"></div><span>5</span><span class="v">24</span></div>
  <div class="tok"><div class="bar" style="width:32px;height:32px"></div><span>6</span><span class="v">32</span></div>
  <div class="tok"><div class="bar" style="width:48px;height:48px"></div><span>7</span><span class="v">48</span></div>
  <div class="tok"><div class="bar" style="width:64px;height:64px"></div><span>8</span><span class="v">64</span></div>
</div>
</body></html>
