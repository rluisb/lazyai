name: Feature Request
description: Propose a new feature for LazyAI
title: "feat: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Feature requests should be discussed in [GitHub Discussions](https://github.com/rluisb/lazyai/discussions) first. Only open an issue after a maintainer confirms it.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: How would you like it to work? Be specific.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you think about?
  - type: dropdown
    id: scope
    attributes:
      label: Affected Package(s)
      description: Which package would this change?
      multiple: true
      options:
        - packages/cli
        - packages/orchestrator
        - packages/diffviewer
        - Documentation
        - CI / Build
        - Other
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else we should know? Links, screenshots, references?
