name: CI - CLI

on:
  push:
    branches: [main]
    paths:
      - 'packages/cli/**'
      - '.github/workflows/ci-cli.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/cli/**'
      - '.github/workflows/ci-cli.yml'

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli
    env:
      GO_VERSION: '1.26.x'
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: packages/cli/go.sum

      - name: Test
        env:
          GOWORK: off
        run: go test ./... -v -count=1 -timeout 120s

      - name: Vet
        env:
          GOWORK: off
        run: go vet ./...

      - name: Build
        env:
          GOWORK: off
        run: go build -o /tmp/lazyai-cli ./cmd/lazyai-cli
