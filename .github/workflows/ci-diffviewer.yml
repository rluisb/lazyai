name: CI - Diffviewer

on:
  push:
    branches: [main]
    paths:
      - 'packages/diffviewer/**'
      - '.github/workflows/ci-diffviewer.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/diffviewer/**'
      - '.github/workflows/ci-diffviewer.yml'

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/diffviewer
    env:
      GO_VERSION: '1.26.x'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: packages/diffviewer/go.sum

      - name: Test
        env:
          GOWORK: off
        run: go test ./... -v -count=1 -timeout 120s

      - name: Vet
        env:
          GOWORK: off
        run: go vet ./...

      - name: Build
        env:
          GOWORK: off
        run: go build -o /tmp/lazyai-diffviewer ./cmd/lazyai-diffviewer
