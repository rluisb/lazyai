name: Cross-Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: '1.26.x'

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            packages/cli/go.sum
            packages/diffviewer/go.sum

      - name: Test CLI
        if: runner.os != 'Windows'
        run: cd packages/cli && go test ./... -count=1 -timeout 180s
        env:
          GOWORK: off

      - name: Test Diffviewer
        if: runner.os != 'Windows'
        run: cd packages/diffviewer && go test ./... -count=1 -timeout 60s
        env:
          GOWORK: off

      - name: Vet CLI
        if: runner.os != 'Windows'
        run: cd packages/cli && go vet ./...
        env:
          GOWORK: off

      - name: Build CLI
        run: cd packages/cli && go build ./cmd/lazyai-cli
        env:
          GOWORK: off

      - name: Build Diffviewer
        run: cd packages/diffviewer && go build ./cmd/lazyai-diffviewer
        env:
          GOWORK: off

  mkdocs:
    name: MkDocs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r docs/requirements.txt
      - run: mkdocs build --strict

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build CLI
        run: cd packages/cli && go build ./cmd/lazyai-cli
      - name: Run smoke tests
        run: |
          chmod +x tests/scripts/smoke-test.sh
          ./tests/scripts/smoke-test.sh

  cross-compile:
    name: Cross-Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Cross-compile all targets
        run: make snapshot
