name: Go CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/ai-setup-go/**'
      - 'packages/orchestrator-go/**'
      - 'library/**'
      - 'go.work'
  pull_request:
    branches: [main]
    paths:
      - 'packages/ai-setup-go/**'
      - 'packages/orchestrator-go/**'
      - 'library/**'
      - 'go.work'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ai-setup-go
    strategy:
      matrix:
        go-version: ['1.26.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Build
        run: go build -o ai-setup .
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./... -v -count=1 -timeout 120s
      - name: Build cross-platform
        run: |
          GOOS=darwin GOARCH=arm64 go build -o /dev/null .
          GOOS=linux GOARCH=amd64 go build -o /dev/null .
          GOOS=windows GOARCH=amd64 go build -o /dev/null .
      - name: Build orchestrator
        working-directory: packages/orchestrator-go
        run: go build -o ai-setup-orchestrator ./cmd/orchestrator
      - name: Vet orchestrator
        working-directory: packages/orchestrator-go
        run: go vet ./...
      - name: Test orchestrator
        working-directory: packages/orchestrator-go
        run: go test ./... -v -count=1 -timeout 120s
      - name: Build orchestrator cross-platform
        working-directory: packages/orchestrator-go
        run: |
          GOOS=darwin GOARCH=arm64 go build -o /dev/null ./cmd/orchestrator
          GOOS=darwin GOARCH=amd64 go build -o /dev/null ./cmd/orchestrator
          GOOS=linux GOARCH=amd64 go build -o /dev/null ./cmd/orchestrator
          GOOS=linux GOARCH=arm64 go build -o /dev/null ./cmd/orchestrator
          GOOS=windows GOARCH=amd64 go build -o /dev/null ./cmd/orchestrator
