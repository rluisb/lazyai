name: Go CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/cli/**'
      - 'packages/orchestrator/**'
      - 'packages/diffviewer/**'
      - 'go.work'
      - 'go.work.sum'
      - 'Makefile'
      - '.github/workflows/go-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/cli/**'
      - 'packages/orchestrator/**'
      - 'packages/diffviewer/**'
      - 'go.work'
      - 'go.work.sum'
      - 'Makefile'
      - '.github/workflows/go-ci.yml'

jobs:
  modules:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    env:
      GO_VERSION: '1.26.x'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: CLI
            module: packages/cli
            binary: lazyai-cli
            package: ./cmd/lazyai-cli
          - name: Orchestrator
            module: packages/orchestrator
            binary: lazyai-orchestrator
            package: ./cmd/lazyai-orchestrator
          - name: Diffviewer
            module: packages/diffviewer
            binary: lazyai-diffviewer
            package: ./cmd/lazyai-diffviewer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Test
        working-directory: ${{ matrix.module }}
        run: go test ./... -v -count=1 -timeout 120s

      - name: Vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: Build
        working-directory: ${{ matrix.module }}
        run: go build -o /tmp/${{ matrix.binary }} ${{ matrix.package }}

      - name: Build cross-platform
        working-directory: ${{ matrix.module }}
        run: |
          for target in darwin/arm64 darwin/amd64 linux/amd64 linux/arm64 windows/amd64; do
            os="${target%/*}"
            arch="${target#*/}"
            ext=""
            if [ "$os" = "windows" ]; then
              ext=".exe"
            fi

            GOOS="$os" GOARCH="$arch" go build -o "/tmp/${{ matrix.binary }}-$os-$arch$ext" ${{ matrix.package }}
          done
