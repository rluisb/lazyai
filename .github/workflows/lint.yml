name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run go fmt
        run: |
          cd packages/cli
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "❌ Code is not formatted. Run 'gofmt -w .'"
            gofmt -l .
            exit 1
          fi
          echo "✅ Code is properly formatted"

      - name: Run go vet
        run: |
          cd packages/cli
          go vet ./...

  staticcheck-advisory:
    name: Staticcheck advisory
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck (advisory)
        run: |
          cd packages/cli
          staticcheck ./... || {
            echo "::warning::staticcheck has pre-existing findings; advisory only"
            exit 0
          }
  drift-scan:
    name: Banned-token drift scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run drift scan
        run: |
          if [ ! -x tests/scripts/drift-scan.sh ]; then
            chmod +x tests/scripts/drift-scan.sh
          fi
          tests/scripts/drift-scan.sh

  yaml-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 120}}}" .opencode/workflows/
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 120}}}" .github/workflows/
