name: Publish to npm

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck & Build
        run: |
          pnpm --filter @ai-setup/cli run typecheck
          pnpm --filter @ai-setup/cli run build

      - name: Run Tests
        run: pnpm --filter @ai-setup/cli run test

      - name: Bump version & Tag (if manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        working-directory: packages/ai-setup-ts
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          npm version ${{ github.event.inputs.version }} -m "chore(release): %s"
          git push --follow-tags

      - name: Publish to npm
        working-directory: packages/ai-setup-ts
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
