name: Release - CLI

on:
  push:
    tags:
      - 'packages/cli/v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.26.x'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: packages/cli/go.sum

      - name: Set release metadata
        id: metadata
        run: |
          tag_name="${GITHUB_REF_NAME}"
          version="${GITHUB_REF_NAME##*/}"
          {
            echo "version=$version"
            echo "tag_name=$tag_name"
          } >> "$GITHUB_OUTPUT"

      - name: Build release assets
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
          GOWORK: off
        run: |
          rm -rf dist && mkdir -p dist
          ldflags="-s -w -X github.com/rluisb/lazyai/packages/cli/cmd.Version=${VERSION} -X github.com/rluisb/lazyai/packages/cli/internal/version.Version=${VERSION}"
          for target in darwin/arm64 darwin/amd64 linux/amd64 linux/arm64 windows/amd64; do
            os="${target%/*}"
            arch="${target#*/}"
            ext=""
            if [ "$os" = "windows" ]; then ext=".exe"; fi
            out="$PWD/dist/lazyai-cli-$os-$arch$ext"
            echo "Building $out"
            (cd packages/cli && GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -ldflags "$ldflags" -o "$out" ./cmd/lazyai-cli)
          done
          (cd dist && shasum -a 256 lazyai-cli-* > checksums.txt)

      - name: Generate Homebrew formula
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          SHA256_DARWIN_ARM64="$(grep 'lazyai-cli-darwin-arm64' dist/checksums.txt | cut -d' ' -f1)"
          SHA256_DARWIN_AMD64="$(grep 'lazyai-cli-darwin-amd64' dist/checksums.txt | cut -d' ' -f1)"
          sed "s/{{VERSION}}/${VERSION}/g; s/{{SHA256_DARWIN_ARM64}}/${SHA256_DARWIN_ARM64}/g; s/{{SHA256_DARWIN_AMD64}}/${SHA256_DARWIN_AMD64}/g" \
            packaging/homebrew/lazyai-cli.rb.tmpl > dist/lazyai-cli.rb
          echo "Generated dist/lazyai-cli.rb"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag_name }}
          name: LazyAI CLI ${{ steps.metadata.outputs.version }}
          files: |
            dist/lazyai-cli-*
            dist/checksums.txt
            dist/lazyai-cli.rb
          generate_release_notes: true
          draft: false
