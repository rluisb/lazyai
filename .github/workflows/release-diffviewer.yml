name: Release - Diffviewer

on:
  push:
    tags:
      - 'packages/diffviewer/v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.26.x'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: packages/diffviewer/go.sum

      - name: Set release metadata
        id: metadata
        run: |
          tag_name="${GITHUB_REF_NAME}"
          version="${GITHUB_REF_NAME##*/}"
          {
            echo "version=$version"
            echo "tag_name=$tag_name"
          } >> "$GITHUB_OUTPUT"

      - name: Build release assets
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
          GOWORK: off
        run: |
          rm -rf dist && mkdir -p dist
          for target in darwin/arm64 darwin/amd64 linux/amd64 linux/arm64 windows/amd64; do
            os="${target%/*}"
            arch="${target#*/}"
            ext=""
            if [ "$os" = "windows" ]; then ext=".exe"; fi
            out="$PWD/dist/lazyai-diffviewer-$os-$arch$ext"
            echo "Building $out"
            (cd packages/diffviewer && GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -ldflags "-s -w" -o "$out" ./cmd/lazyai-diffviewer)
          done
          (cd dist && shasum -a 256 lazyai-diffviewer-* > checksums.txt)

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.metadata.outputs.tag_name }}
          name: LazyAI Diffviewer ${{ steps.metadata.outputs.version }}
          files: |
            dist/lazyai-diffviewer-*
            dist/checksums.txt
          generate_release_notes: true
          draft: false
