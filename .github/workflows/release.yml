name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Get version
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: Build binaries
      run: |
        cd packages/cli
        mkdir -p dist
        
        # Build for multiple platforms
        GOOS=linux GOARCH=amd64 go build -ldflags="-X main.Version=${{ steps.get_version.outputs.VERSION }}" -o dist/lazyai-cli-linux-amd64 ./cmd/lazyai-cli
        GOOS=linux GOARCH=arm64 go build -ldflags="-X main.Version=${{ steps.get_version.outputs.VERSION }}" -o dist/lazyai-cli-linux-arm64 ./cmd/lazyai-cli
        GOOS=darwin GOARCH=amd64 go build -ldflags="-X main.Version=${{ steps.get_version.outputs.VERSION }}" -o dist/lazyai-cli-darwin-amd64 ./cmd/lazyai-cli
        GOOS=darwin GOARCH=arm64 go build -ldflags="-X main.Version=${{ steps.get_version.outputs.VERSION }}" -o dist/lazyai-cli-darwin-arm64 ./cmd/lazyai-cli
        GOOS=windows GOARCH=amd64 go build -ldflags="-X main.Version=${{ steps.get_version.outputs.VERSION }}" -o dist/lazyai-cli-windows-amd64.exe ./cmd/lazyai-cli
        
        # Create tarballs
        cd dist
        for binary in lazyai-cli-*; do
          if [[ "$binary" == *.exe ]]; then
            zip "${binary%.exe}.zip" "$binary"
          else
            tar -czf "${binary}.tar.gz" "$binary"
          fi
        done
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: packages/cli/dist/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
