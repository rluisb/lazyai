name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: cd packages/cli && go mod download

      - name: Run unit tests
        run: cd packages/cli && go test ./... -race -coverprofile=coverage.out

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: packages/cli/coverage.out
          # Advisory by design: the unit-test step above is the enforcing gate, so a
          # codecov upload/network failure must not block PRs.
          fail_ci_if_error: false

  smoke-test:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build CLI
        run: cd packages/cli && go build ./cmd/lazyai-cli

      - name: Run smoke tests
        run: |
          chmod +x tests/scripts/smoke-test.sh
          ./tests/scripts/smoke-test.sh

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, darwin]
        arch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          cd packages/cli
          output="lazyai-cli-${{ matrix.os }}-${{ matrix.arch }}"
          go build -o "$output" ./cmd/lazyai-cli
          echo "Built: $output"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: lazyai-cli-${{ matrix.os }}-${{ matrix.arch }}
          path: packages/cli/lazyai-cli-*
