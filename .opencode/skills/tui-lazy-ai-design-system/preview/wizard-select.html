<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body { margin: 0; padding: 18px 22px; font-family: var(--font-mono); font-size: 13px; }
.title { color: var(--lz-primary); font-weight: 700; margin-bottom: 10px; }
.q { color: var(--lz-text); }
.opt { display: flex; align-items: center; gap: 10px; padding: 4px 0; }
.cur { color: var(--lz-primary); font-weight: 700; }
.dim { color: var(--lz-dimmed); }
.sel { color: var(--lz-text); }
.tag { color: var(--lz-secondary); }
.help { color: var(--lz-dimmed); margin-top: 10px; font-size: 12px; }
</style></head><body>
<div class="title">Scope</div>
<div class="opt"><span class="cur">▸</span><span class="sel">project</span><span class="tag">— recommended</span><span class="dim">self-contained single repository</span></div>
<div class="opt"><span class="dim">  </span><span class="sel">workspace</span><span class="dim">planning repo with multi-project management</span></div>
<div class="opt"><span class="dim">  </span><span class="sel">global</span><span class="dim">install to ~/.config/opencode/ + native tool global paths</span></div>
<div class="help">↑/↓ navigate · enter select · q quit</div>
</body></html>
