# Hotfix Workflow
# Emergency fix for production issues

name: hotfix
version: "1.0"
description: "Emergency fix workflow for production issues"

phases:
  - name: diagnose
    description: "Quick root cause analysis"
    agent: scout
    mode: diagnose
    inputs:
      - error_logs
      - incident_description
    outputs:
      - diagnosis_report
    gates:
      - type: auto
        description: "Auto-approve diagnosis"
        
  - name: fix
    description: "Implement minimal fix"
    agent: builder
    mode: standard
    inputs:
      - diagnosis_report
    outputs:
      - fix_implementation
    gates:
      - type: human
        description: "Review fix before deploy"
        
  - name: validate
    description: "Run smoke tests"
    agent: reviewer
    mode: quick
    inputs:
      - fix_implementation
    outputs:
      - validation_report
    gates:
      - type: auto
        description: "Auto-run validation"

fallback:
  on_agent_failure:
    action: escalate
    notify: human
  on_test_failure:
    action: rollback
  on_timeout:
    action: escalate
    notify: human

metadata:
  estimated_duration: "30-60 minutes"
  complexity: high
  requires_approval: true
  priority: P1
