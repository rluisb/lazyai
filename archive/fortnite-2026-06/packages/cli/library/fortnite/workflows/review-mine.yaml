name: review-mine
trigger: /review-mine
description: Process feedback on your own PR — collect → classify → evaluate → plan → dispatch fix workflow. Read-only from sources. Change requests trigger separate rpi/bugfix workflow.
modes:
  full:
    phases: [collect, classify, evaluate, plan, dispatch]
    skip_gates: false
  quick:
    phases: [collect, classify, dispatch]
    skip_gates: false
default_mode: full
phases:
  - name: collect
    agent: loop-driver
    skill: feedback-review
    mode: collect
    feedforward: "PR: {PR_URL}. Collect all review comments via collect-feedback.sh. READ-ONLY."
    output_schema:
      type: feedback_review
      fields:
        - comment_classification
        - severity
        - action_required
        - spec_reference
    gate: null

  - name: classify
    agent: shield-audit
    skill: feedback-review
    mode: classify
    feedforward: "Comments: {COLLECT_OUTPUT}. Classify each: question (needs clarification), change-request (code must change), nit (style preference), approval (no action). READ-ONLY."
    output_schema:
      type: feedback_review
      fields:
        - comment_classification
        - severity
        - action_required
        - spec_reference
    gate: null

  - name: evaluate
    agent: shield-audit
    skill: feedback-review
    mode: evaluate
    feedforward: "Classified: {CLASSIFY_OUTPUT}. For each change-request, evaluate against: original spec (§V/§I), Jira ticket scope, Confluence architecture, codebase patterns, shield-wall (backend), build-fort (UI), truth-chain decisions, the-vault lessons. Is the request valid? Should we fix? READ-ONLY."
    output_schema:
      type: feedback_review
      fields:
        - comment_classification
        - severity
        - action_required
        - spec_reference
    gate: null

  - name: plan
    agent: shield-audit
    skill: feedback-review
    mode: plan
    feedforward: "Evaluated: {EVALUATE_OUTPUT}. Produce action plan: which change-requests to address, in what order, with rationale. For each: what workflow to trigger (rpi for feature changes, bugfix for bugs, refactor for cleanup). Do NOT implement — just plan."
    output_schema:
      type: feedback_review
      fields:
        - comment_classification
        - severity
        - action_required
        - spec_reference
    gate: human_approves
    gate_prompt: "Action plan ready. Approve and dispatch fix workflows?"

  - name: dispatch
    agent: loop-driver
    skill: workflow-engine
    mode: orchestrate
    feedforward: "Action plan: {PLAN_OUTPUT}. For each approved change-request, trigger the appropriate workflow: rpi for feature changes, bugfix for bugs, refactor for cleanup. Pass the change-request as the goal. Link back to PR."
    output_schema:
      type: feedback_review
      fields:
        - comment_classification
        - severity
        - action_required
        - spec_reference
    gate: null
