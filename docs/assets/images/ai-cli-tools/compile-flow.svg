<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">LazyAI canonical compile flow</title>
  <desc id="desc">LazyAI init writes canonical .ai files, compile emits seven AI CLI tool surfaces, and lock files track managed output.</desc>
  <defs>
    <style>
      .box{fill:#eef2ff;stroke:#4f46e5;stroke-width:2;rx:14;ry:14}.tool{fill:#ecfdf5;stroke:#059669;stroke-width:2;rx:12;ry:12}.meta{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:12;ry:12}.text{font:600 18px system-ui,-apple-system,Segoe UI,sans-serif;fill:#111827}.small{font:500 14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#374151}.arrow{stroke:#4b5563;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#4b5563"/></marker>
  </defs>
  <rect x="30" y="120" width="190" height="92" class="box"/>
  <text x="125" y="156" text-anchor="middle" class="text">lazyai-cli init</text>
  <text x="125" y="184" text-anchor="middle" class="small">scope · tools · preset</text>
  <path d="M220 166 H310" class="arrow"/>
  <rect x="310" y="94" width="220" height="144" class="box"/>
  <text x="420" y="130" text-anchor="middle" class="text">canonical .ai/</text>
  <text x="420" y="160" text-anchor="middle" class="small">lazyai.json · mcp.json</text>
  <text x="420" y="186" text-anchor="middle" class="small">agents · skills · hooks</text>
  <text x="420" y="212" text-anchor="middle" class="small">prompts · templates</text>
  <path d="M530 166 H620" class="arrow"/>
  <rect x="620" y="30" width="142" height="48" class="tool"/><text x="691" y="61" text-anchor="middle" class="small">OpenCode</text>
  <rect x="788" y="30" width="142" height="48" class="tool"/><text x="859" y="61" text-anchor="middle" class="small">Claude Code</text>
  <rect x="620" y="96" width="142" height="48" class="tool"/><text x="691" y="127" text-anchor="middle" class="small">Copilot</text>
  <rect x="788" y="96" width="142" height="48" class="tool"/><text x="859" y="127" text-anchor="middle" class="small">Pi</text>
  <rect x="620" y="162" width="142" height="48" class="tool"/><text x="691" y="193" text-anchor="middle" class="small">OMP</text>
  <rect x="788" y="162" width="142" height="48" class="tool"/><text x="859" y="193" text-anchor="middle" class="small">Kiro</text>
  <rect x="704" y="228" width="142" height="48" class="tool"/><text x="775" y="259" text-anchor="middle" class="small">Antigravity</text>
  <path d="M530 166 C580 166 580 54 620 54" class="arrow"/><path d="M530 166 C650 166 650 54 788 54" class="arrow"/><path d="M530 166 C580 166 580 120 620 120" class="arrow"/><path d="M530 166 C650 166 650 120 788 120" class="arrow"/><path d="M530 166 H620" class="arrow"/><path d="M530 166 C650 166 650 186 788 186" class="arrow"/><path d="M530 166 C625 166 625 252 704 252" class="arrow"/>
  <rect x="310" y="270" width="220" height="58" class="meta"/>
  <text x="420" y="304" text-anchor="middle" class="small">.ai/lock.json tracks managed hashes</text>
  <path d="M420 238 V270" class="arrow"/>
</svg>
