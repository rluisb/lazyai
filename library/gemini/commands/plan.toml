name = "plan"
description = "Create an implementation plan with acceptance criteria"
prompt = """
Write an implementation plan for the user's task.

Structure:
1. **Context** — Why is this change needed? What problem does it solve?
2. **Acceptance Criteria** — Concrete, verifiable outcomes (AC-1, AC-2, ...)
3. **Approach** — Chosen implementation approach and the alternatives rejected.
4. **Critical Files** — Files to modify vs. files to create.
5. **Waves** — Break work into dependency-ordered waves with per-wave exit criteria.
6. **Verification** — How to test end-to-end.
7. **Risks** — Known risks and mitigations.

Keep it scannable. Prefer concrete file paths over generic descriptions.
"""
