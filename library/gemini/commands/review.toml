name = "review"
description = "Review current work against quality gates"
prompt = """
Perform a structured review of the current work:

1. **Correctness** — Do all tests pass? Any edge cases missed?
2. **Scope** — Are changes within the agreed scope? Any drive-by refactors?
3. **Security** — Any OWASP top-10 risks (injection, XSS, broken auth)?
4. **Style** — Does the code match existing conventions in the file/module?
5. **Documentation** — Are public APIs documented? Is non-obvious logic commented?

Report findings as a checklist. Flag anything that would block merge.
"""
