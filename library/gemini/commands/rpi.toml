name = "rpi"
description = "Start the Research → Plan → Implement workflow"
prompt = """
Begin the RPI workflow for the user's next task.

1. **Research** — Map what exists. Explore the relevant code paths, read specs,
   and understand the current state. Stop at the HUMAN GATE for approval.
2. **Plan** — Define the approach, acceptance criteria, and wave structure.
   Stop at the HUMAN GATE for approval.
3. **Implement** — Execute one wave per iteration. Verify each wave with tests
   before moving on.

Preserve scope boundaries. Prefer editing existing code over adding new
abstractions. Always stop at HUMAN GATEs.
"""
