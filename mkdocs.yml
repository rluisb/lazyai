site_name: LazyAI
site_description: Scaffold a canonical, multi-tool AI development environment from one CLI.
site_author: rluisb
site_url: https://rluisb.github.io/lazyai/
repo_name: rluisb/lazyai
repo_url: https://github.com/rluisb/lazyai
copyright: Copyright &copy; rluisb

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - gen-files:
      scripts:
        - docs/.build/generate_llm_txt.py

exclude_docs: |
  AI-Agentic-Setup-Implementation-Plan.md
  AI-Agentic-Setup-Playbook.md
  AI-Agentic-Setup-Templates/**
  compliance.md
  orchestration-usage.md
  orchestrator-blueprint.md
  orchestrator-design.md
  orchestrator-research.md
  release-process.md
  template-design-principles.md
  SOURCES.md
  cupcake-rpi-setup.md
  docs/**
  lazyai-vibelab-product-spec-pack/**
  lazyai_vibelab_remaining_cycles_pack/**
  lazyai_vibelab_rpi_cycle2_package/**
  lazyai_vibelab_rpi_prompt_package/**
  reports/**
  skills/**
  wiki/**
  workflows/**
  prompts/**
  rules/**
  templates/**
  .build/**
  README.md

validation:
  nav:
    omitted_files: info
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rluisb/lazyai

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format ""
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: getting-started/quick-start.md
      - Installation: getting-started/installation.md
      - Commands: getting-started/commands.md
  - Concepts:
      - How It Works: concepts/how-it-works.md
      - Package Layout: concepts/package-layout.md
      - Scopes: concepts/scopes.md
      - Presets: concepts/presets.md
      - Tools: concepts/tools.md
      - Product Boundaries: concepts/product-boundaries.md
      - Skill Quality: concepts/skill-quality.md
      - Agent Contracts: concepts/agent-contracts.md
      - Context Discipline: concepts/context-discipline.md
      - Multi-Agent Boundary: concepts/multi-agent-boundary.md
      - Hook Lifecycle: concepts/hook-lifecycle.md
      - Trace/Eval Improvement Loop: concepts/trace-eval-improvement-loop.md
      - Token Rent: concepts/token-rent.md
      - Minimality: concepts/minimality.md
      - Minimality Report: concepts/minimality-report.md
      - Harness Principles: concepts/harness-principles.md
      - MCP vs CLI: concepts/mcp-vs-cli.md
      - Library Manifests: concepts/library-manifests.md
  - AI CLI Tools:
      - Overview: ai-cli-tools/index.md
      - OpenCode: ai-cli-tools/opencode.md
      - Claude Code: ai-cli-tools/claude-code.md
      - GitHub Copilot: ai-cli-tools/copilot.md
      - Pi: ai-cli-tools/pi.md
      - OMP: ai-cli-tools/omp.md
      - Kiro: ai-cli-tools/kiro.md
      - Antigravity: ai-cli-tools/antigravity.md
  - Reference:
      - Tool Outputs: reference/tool-outputs.md
      - Agents: reference/agents.md
      - Skills: reference/skills.md
      - Hooks: reference/hooks.md
      - MCP Servers: reference/mcp-servers.md
      - CLI Tools: reference/cli-tools.md
      - Adapters:
          - Capability Matrix: adapters/capability-matrix.md
          - OpenCode: adapters/opencode.md
          - Claude Code: adapters/claude-code.md
          - GitHub Copilot: adapters/copilot.md
          - Pi: adapters/pi.md
          - OMP: adapters/omp.md
          - Antigravity: adapters/antigravity.md
          - Kiro: adapters/kiro.md
          - Beta Verification (2026-06): adapters/snapshots/beta-adapter-verification-2026-06.md
  - CLI Reference:
