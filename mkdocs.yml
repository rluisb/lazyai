site_name: LazyAI
site_description: Scaffold a canonical, multi-tool AI development environment from one CLI.
site_author: rluisb
site_url: https://rluisb.github.io/lazyai/
repo_name: rluisb/lazyai
repo_url: https://github.com/rluisb/lazyai
copyright: Copyright &copy; rluisb

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - gen-files:
      scripts:
        - docs/.build/generate_llm_txt.py

exclude_docs: |
  AI-Agentic-Setup-Implementation-Plan.md
  AI-Agentic-Setup-Playbook.md
  AI-Agentic-Setup-Templates/**
  compliance.md
  orchestration-usage.md
  orchestrator-blueprint.md
  orchestrator-design.md
  orchestrator-research.md
  release-process.md
  template-design-principles.md
  prompts/**
  rules/**
  templates/**
  .build/**

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rluisb/lazyai

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: getting-started/quick-start.md
      - Installation: getting-started/installation.md
  - Concepts:
      - How It Works: concepts/how-it-works.md
      - Package Layout: concepts/package-layout.md
      - Scopes: concepts/scopes.md
      - Presets: concepts/presets.md
      - Tools: concepts/tools.md
  - CLI Reference:
      - Overview: cli/index.md
      - Command Reference: cli/reference.md
  - Integration:
      - MCP: integration/mcp.md
      - Orchestration: integration/orchestration.md
  - Development:
      - Contributing: development/contributing.md
      - Release Process: development/release.md
      - Dashboard QA Checklist: development/dashboard-qa-checklist.md
  - Migration:
      - ai-setup to LazyAI: migration/ai-setup-to-lazyai.md
  - Troubleshooting:
      - FAQ: troubleshooting/faq.md
