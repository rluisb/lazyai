name: review-others
trigger: /review-others
description: Review someone elses PR -- discover -> gather context -> review -> rate -> format output. Read-only. Generates formatted Slack/PR/Jira comments ready to copy-paste.
modes:
  full:
    phases: [discover, gather, review, rate, format]
    skip_gates: false
  quick:
    phases: [discover, review, format]
    skip_gates: false
default_mode: full
phases:
  - name: discover
    agent: loop-driver
    skill: pr-watcher
    mode: check-reviews
    feedforward: "Find PRs needing review. Use gh-dash to discover open PRs requesting review from me."
    output_schema:
      type: pr_review
      fields:
        - finding_category
        - severity
        - confidence
        - recommendation
    gate: null

  - name: gather
    agent: loot-hawk
    skill: storm-scout
    mode: research
    feedforward: "PR: {PR_URL}. Pull context READ-ONLY: Jira ticket, Confluence docs, spec files, codebase patterns. Do NOT modify anything."
    output_schema:
      type: pr_review
      fields:
        - finding_category
        - severity
        - confidence
        - recommendation
    gate: null

  - name: review
    agent: shield-audit
    skill: pr-review
    mode: review
    feedforward: "PR: {PR_URL}. Context: {GATHER_OUTPUT}. Review diff against: spec (§V/§I), Jira requirements, Confluence architecture, codebase patterns, shield-wall (backend anti-patterns), build-fort (UI anti-patterns), test coverage. READ-ONLY."
    output_schema:
      type: pr_review
      fields:
        - finding_category
        - severity
        - confidence
        - recommendation
    gate: null

  - name: rate
    agent: shield-audit
    skill: zero-point
    mode: review
    feedforward: "Findings: {REVIEW_OUTPUT}. Classify each finding: critical (blocks merge), high (must fix), medium (should fix), low (nice to have), nit (style). Rate against spec compliance, security, correctness, performance, maintainability."
    output_schema:
      type: pr_review
      fields:
        - finding_category
        - severity
        - confidence
        - recommendation
    gate: null

  - name: format
    agent: loop-driver
    skill: pr-review
    mode: summarize
    feedforward: "Rated findings: {RATE_OUTPUT}. Generate formatted output ready to copy-paste. Produce three formats: 1) Slack message (thread-friendly, emoji ratings), 2) PR review comment (markdown, grouped by severity), 3) Jira comment (links to PR, summary of findings). Do NOT post -- just generate the text."
    output_schema:
      type: pr_review
      fields:
        - finding_category
        - severity
        - confidence
        - recommendation
    gate: human_confirms
    gate_prompt: "Review complete. Copy the formatted output to Slack/PR/Jira?"
